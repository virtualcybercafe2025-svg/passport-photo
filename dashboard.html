<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Dashboard - Professional Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f8fafc; color: #334155; }
        
        /* Navbar Styling */
        .navbar { background: #1e293b; color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .btn-logout { background: #ef4444; color: white; padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-logout:hover { background: #b91c1c; }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 380px 1fr; gap: 30px; }
        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }

        /* Card Styling */
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        h3 { font-size: 18px; margin-bottom: 20px; color: #1e293b; border-bottom: 2px solid #3b82f6; display: inline-block; padding-bottom: 5px; }
        
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #64748b; margin-top: 15px; }
        input[type="file"], select, input[type="number"], input[type="range"] { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; background: #fcfcfc; }
        
        /* Custom Controls */
        .custom-controls { background: #f1f5f9; padding: 15px; border-radius: 10px; margin-top: 10px; display: none; }
        .color-group { display: flex; align-items: center; gap: 10px; }
        input[type="color"] { width: 50px; height: 40px; border: none; cursor: pointer; background: none; }

        .btn-primary { width: 100%; padding: 14px; background: #3b82f6; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 20px; box-shadow: 0 4px 6px rgba(59, 130, 246, 0.2); }
        .btn-primary:hover { background: #2563eb; transform: translateY(-1px); }
        .btn-success { background: #10b981; margin-top: 10px; }
        .btn-success:hover { background: #059669; }

        /* Preview Box */
        .preview-box { background: white; border-radius: 16px; border: 2px dashed #cbd5e1; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 550px; padding: 20px; position: sticky; top: 20px; }
        canvas { max-width: 100%; height: auto; border: 1px solid #000; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); display: none; }
        #status-msg { font-size: 14px; font-weight: 600; color: #3b82f6; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="navbar">
    <h2 style="font-size: 22px; letter-spacing: 1px;">PHOTO DASHBOARD</h2>
    <button class="btn-logout" onclick="logout()">Logout</button>
</div>

<div class="container">
    <!-- settings Side -->
    <div class="card">
        <h3>1. Image Adjustments</h3>
        
        <label>Select Photo (ছবি নির্বাচন করুন):</label>
        <input type="file" id="imageInput" accept="image/*">
        
        <label>Background Color:</label>
        <select id="bgType" onchange="toggleCustomBg()">
            <option value="white">Standard White</option>
            <option value="blue">Standard Blue</option>
            <option value="custom">Customized Color 🎨</option>
            <option value="original">Original (No Change)</option>
        </select>

        <div id="customBgArea" class="custom-controls">
            <label>Pick Your Color:</label>
            <div class="color-group">
                <input type="color" id="customColor" value="#ffffff" onchange="applyChanges()">
                <span id="colorHex">#ffffff</span>
            </div>
        </div>

        <label>Image Quality Mode:</label>
        <select id="qualityMode" onchange="toggleCustomQuality()">
            <option value="auto">Auto Enhance (Standard)</option>
            <option value="custom">Manual Customized ⚙️</option>
        </select>

        <div id="customQualityArea" class="custom-controls">
            <label>Brightness: <span id="v_bright">100</span>%</label>
            <input type="range" id="r_bright" min="50" max="200" value="100" oninput="applyChanges()">
            
            <label>Contrast: <span id="v_contrast">100</span>%</label>
            <input type="range" id="r_contrast" min="50" max="200" value="100" oninput="applyChanges()">
            
            <label>Sharpness: <span id="v_sharp">100</span>%</label>
            <input type="range" id="r_sharp" min="0" max="10" value="0" oninput="applyChanges()">
        </div>

        <button class="btn-primary btn-success" id="processBtn" onclick="startProcessing()">Process & Save Changes</button>

        <hr style="margin: 25px 0; border: 0; border-top: 1px solid #e2e8f0;">

        <h3>2. Print & Download</h3>
        <label>Output Size:</label>
        <select id="photoSize">
            <option value="passport">Passport (3.5 x 4.5 cm)</option>
            <option value="stamp">Stamp (2.0 x 2.5 cm)</option>
        </select>
        
        <label>No. of Copies:</label>
        <input type="number" id="copyCount" value="10" min="1" max="100">
        
        <button class="btn-primary" onclick="downloadPDF()">Download Print-Ready PDF</button>
    </div>

    <!-- Preview Side -->
    <div class="preview-box">
        <div id="status-msg"></div>
        <p id="placeholder" style="color: #94a3b8; font-weight: 500;">Photo preview will appear here</p>
        <canvas id="mainCanvas"></canvas>
    </div>
</div>

<script>
    if(!localStorage.getItem("userMobile")) { window.location.href = "index.html"; }
    function logout() { localStorage.clear(); window.location.href = "index.html"; }

    let currentImgData = null;
    const API_KEY = "YOUR_REMOVE_BG_API_KEY"; // API কী থাকলে দিন

    function toggleCustomBg() {
        const val = document.getElementById('bgType').value;
        document.getElementById('customBgArea').style.display = (val === 'custom') ? 'block' : 'none';
        applyChanges();
    }

    function toggleCustomQuality() {
        const val = document.getElementById('qualityMode').value;
        document.getElementById('customQualityArea').style.display = (val === 'custom') ? 'block' : 'none';
        applyChanges();
    }

    async function startProcessing() {
        const fileInput = document.getElementById('imageInput');
        if (fileInput.files.length === 0) { alert("Please select a file first!"); return; }

        document.getElementById('status-msg').innerText = "Processing Image... Please Wait.";
        const file = fileInput.files[0];

        if (!API_KEY || API_KEY.includes("YOUR_API")) {
            const reader = new FileReader();
            reader.onload = (e) => { currentImgData = e.target.result; applyChanges(); };
            reader.readAsDataURL(file);
        } else {
            // Remove.bg API Logic (if key exists)
            // ... (Same as before)
        }
    }

    function applyChanges() {
        if (!currentImgData) return;
        
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        
        // Get values
        const bgType = document.getElementById('bgType').value;
        const customColor = document.getElementById('customColor').value;
        const qMode = document.getElementById('qualityMode').value;
        
        // Manual Adjustments
        const br = document.getElementById('r_bright').value;
        const ct = document.getElementById('r_contrast').value;
        const sh = document.getElementById('r_sharp').value;
        
        document.getElementById('v_bright').innerText = br;
        document.getElementById('v_contrast').innerText = ct;
        document.getElementById('v_sharp').innerText = sh;
        document.getElementById('colorHex').innerText = customColor;

        img.onload = function() {
            canvas.width = 350;
            canvas.height = 450;
            
            // Background Logic
            if(bgType === 'white') ctx.fillStyle = "#ffffff";
            else if(bgType === 'blue') ctx.fillStyle = "#00BFFF";
            else if(bgType === 'custom') ctx.fillStyle = customColor;
            
            if(bgType !== 'original') ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Filters Logic
            if(qMode === 'auto') {
                ctx.filter = "brightness(1.05) contrast(1.1)";
            } else {
                ctx.filter = `brightness(${br}%) contrast(${ct}%) saturate(110%) blur(${sh/10}px)`;
            }

            // Smart Crop
            let ratio = Math.max(canvas.width / img.width, canvas.height / img.height);
            let nw = img.width * ratio;
            let nh = img.height * ratio;
            let nx = (canvas.width - nw) / 2;
            let ny = (canvas.height - nh) / 2;

            ctx.drawImage(img, nx, ny, nw, nh);
            
            // Black Border
            ctx.strokeStyle = "black";
            ctx.lineWidth = 4;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);

            canvas.style.display = "block";
            document.getElementById('placeholder').style.display = "none";
            document.getElementById('status-msg').innerText = "Update Successful!";
        };
        img.src = currentImgData;
    }

    function downloadPDF() {
        const canvas = document.getElementById('mainCanvas');
        if(canvas.style.display === "none") { alert("Process the image first!"); return; }

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const imgData = canvas.toDataURL('image/jpeg', 1.0);
        const copies = parseInt(document.getElementById('copyCount').value);
        const size = document.getElementById('photoSize').value;

        let w = 35, h = 45; // Passport
        if(size === "stamp") { w = 20; h = 25; }

        let x = 10, y = 10;
        let margin = 4;

        for(let i = 0; i < copies; i++) {
            pdf.addImage(imgData, 'JPEG', x, y, w, h);
            pdf.setDrawColor(0); pdf.setLineWidth(0.2); pdf.rect(x, y, w, h);
            x += w + margin;
            if(x + w > 200) { x = 10; y += h + margin; }
            if(y + h > 280 && i < copies - 1) { pdf.addPage(); x = 10; y = 10; }
        }
        pdf.save("Passport_Photos.pdf");
    }
</script>

</body>
</html>
