<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ফটো ড্যাশবোর্ড</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background-color: #f0f4f8; }
        .navbar { background: #2563eb; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1000px; margin: 20px auto; padding: 15px; display: flex; flex-wrap: wrap; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; flex: 1; min-width: 300px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .preview-box { flex: 1; min-width: 300px; background: #fff; border: 2px dashed #ccc; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ddd; }
        .btn-green { background: #10b981; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-blue { background: #2563eb; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-red { background: #ef4444; color: white; width: auto; padding: 5px 15px; cursor: pointer; }
        canvas { max-width: 100%; border: 1px solid #000; margin-top: 10px; display: none; }
        #status { font-size: 13px; color: blue; font-weight: bold; }
    </style>
</head>
<body>

<div class="navbar">
    <h2>ফটো পোর্টাল</h2>
    <button class="btn-red" onclick="logout()">লগআউট</button>
</div>

<div class="container">
    <div class="card">
        <h3>ছবি প্রসেস করুন</h3>
        <input type="file" id="imageInput" accept="image/*">
        
        <label>ব্যাকগ্রাউন্ড কালার:</label>
        <select id="bgColor">
            <option value="white">সাদা (White)</option>
            <option value="blue">নীল (Blue)</option>
            <option value="original">অরিজিনাল রাখুন</option>
        </select>

        <label>ছবি পরিষ্কার করুন:</label>
        <select id="brightness">
            <option value="1">স্বাভাবিক (Normal)</option>
            <option value="1.2">হালকা পরিষ্কার (Light)</option>
            <option value="1.4">বেশি পরিষ্কার (Bright)</option>
        </select>

        <button class="btn-green" id="processBtn" onclick="startProcessing()">প্রসেস শুরু করুন</button>

        <hr>
        <h3>প্রিন্ট সেটআপ</h3>
        <label>সাইজ:</label>
        <select id="photoSize">
            <option value="passport">পাসপোর্ট (3.5 x 4.5 cm)</option>
            <option value="stamp">স্ট্যাম্প (2 x 2.5 cm)</option>
        </select>
        
        <label>কপি সংখ্যা:</label>
        <input type="number" id="copyCount" value="10" min="1">
        
        <button class="btn-blue" onclick="downloadPDF()">PDF ডাউনলোড করুন</button>
    </div>

    <div class="preview-box">
        <p id="loadingText">ছবির প্রিভিউ এখানে দেখা যাবে</p>
        <div id="status"></div>
        <canvas id="photoCanvas"></canvas>
    </div>
</div>

<script>
    if(!localStorage.getItem("userMobile")) { window.location.href = "index.html"; }
    function logout() { localStorage.clear(); window.location.href = "index.html"; }

    // আপনার API Key এখানে বসান (যদি থাকে)
    const API_KEY = "আপনার_API_KEY_এখানে"; 

    async function startProcessing() {
        const fileInput = document.getElementById('imageInput');
        if (fileInput.files.length === 0) { alert("ছবি সিলেক্ট করুন!"); return; }

        const status = document.getElementById('status');
        const processBtn = document.getElementById('processBtn');
        const file = fileInput.files[0];

        status.innerText = "AI প্রসেসিং চলছে...";
        processBtn.disabled = true;

        // যদি API Key না থাকে বা কাজ না করে, তবে সরাসরি ছবি লোড হবে
        if (!API_KEY || API_KEY.includes("আপনার_API")) {
            status.innerText = "API কী নেই। অরিজিনাল ছবি ব্যবহার করা হচ্ছে।";
            const reader = new FileReader();
            reader.onload = (e) => renderCanvas(e.target.result);
            reader.readAsDataURL(file);
            processBtn.disabled = false;
        } else {
            // Remove.bg API কল করা
            const formData = new FormData();
            formData.append('image_file', file);
            formData.append('size', 'auto');

            try {
                const response = await fetch('https://api.remove.bg/v1.0/removebg', {
                    method: 'POST',
                    headers: { 'X-Api-Key': API_KEY },
                    body: formData
                });

                if (response.ok) {
                    const blob = await response.blob();
                    renderCanvas(URL.createObjectURL(blob));
                    status.innerText = "ব্যাকগ্রাউন্ড রিমুভ সফল!";
                } else {
                    throw new Error("API Limit reached");
                }
            } catch (err) {
                status.innerText = "API কাজ করছে না। অরিজিনাল ছবি লোড হচ্ছে।";
                const reader = new FileReader();
                reader.onload = (e) => renderCanvas(e.target.result);
                reader.readAsDataURL(file);
            } finally {
                processBtn.disabled = false;
            }
        }
    }

    function renderCanvas(imgUrl) {
        const canvas = document.getElementById('photoCanvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        const bgColor = document.getElementById('bgColor').value;
        const brightValue = document.getElementById('brightness').value;

        img.onload = function() {
            canvas.width = 350;
            canvas.height = 450;
            
            // ব্যাকগ্রাউন্ড কালার
            if(bgColor === "white") {
                ctx.fillStyle = "#FFFFFF";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else if(bgColor === "blue") {
                ctx.fillStyle = "#00BFFF";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // ছবি পরিষ্কার করা ফিল্টার
            ctx.filter = `brightness(${brightValue})`;
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            
            canvas.style.display = "block";
            document.getElementById('loadingText').style.display = "none";
        };
        img.src = imgUrl;
    }

    function downloadPDF() {
        const canvas = document.getElementById('photoCanvas');
        if(canvas.style.display === "none") { alert("আগে ছবি প্রসেস করুন!"); return; }

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const imgData = canvas.toDataURL('image/jpeg', 1.0);
        const copies = parseInt(document.getElementById('copyCount').value);
        const size = document.getElementById('photoSize').value;

        let w = 35, h = 45; // Passport
        if(size === "stamp") { w = 20; h = 25; }

        let x = 10, y = 10;
        for(let i = 0; i < copies; i++) {
            pdf.addImage(imgData, 'JPEG', x, y, w, h);
            x += w + 4;
            if(x > 180) { x = 10; y += h + 4; }
        }
        pdf.save("Photo_Print.pdf");
    }
</script>

</body>
</html>
