<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পাসপোর্ট ফটো পোর্টাল</title>
    <!-- CSS লোড নিশ্চিত করার জন্য -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f3f4f6; }
        .form-card { background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="form-card p-8 w-full max-w-md border-t-8 border-blue-600">
        <div class="text-center mb-6">
            <i class="fa-solid fa-camera-retro text-4xl text-blue-600 mb-2"></i>
            <h1 class="text-3xl font-bold text-gray-800">পাসপোর্ট ফটো পোর্টাল</h1>
            <p class="text-gray-500">আপনার ছবি প্রসেসিং করার সহজ সমাধান</p>
        </div>

        <!-- Login Form -->
        <div id="loginSection">
            <div class="space-y-4">
                <input type="text" id="loginMobile" placeholder="মোবাইল নম্বর" class="w-full p-3 border rounded-lg outline-none focus:border-blue-500">
                <input type="password" id="loginPassword" placeholder="পাসওয়ার্ড" class="w-full p-3 border rounded-lg outline-none focus:border-blue-500">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">লগইন করুন</button>
            </div>
            <p class="mt-4 text-center text-sm">অ্যাকাউন্ট নেই? <a href="javascript:void(0)" onclick="toggleForm()" class="text-blue-600 font-bold">নতুন অ্যাকাউন্ট খুলুন</a></p>
        </div>

        <!-- Registration Form -->
        <div id="registerSection" class="hidden space-y-3">
            <input type="text" id="regName" placeholder="আপনার নাম" class="w-full p-2 border rounded">
            <input type="text" id="regMobile" placeholder="মোবাইল নম্বর" class="w-full p-2 border rounded">
            <input type="password" id="regPass" placeholder="পাসওয়ার্ড" class="w-full p-2 border rounded">
            
            <div class="bg-blue-50 p-3 rounded text-center border border-blue-200">
                <p class="text-xs font-bold mb-1">পেমেন্ট QR কোড</p>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=PAYMENT" class="mx-auto">
            </div>
            
            <input type="text" id="regTxid" placeholder="Transaction ID" class="w-full p-2 border-2 border-orange-400 rounded font-bold">
            <button onclick="handleRegister()" class="w-full bg-green-600 text-white py-3 rounded font-bold">রেজিস্ট্রেশন সাবমিট</button>
            <p class="mt-2 text-center text-sm"><a href="javascript:void(0)" onclick="toggleForm()" class="text-blue-600">লগইন ফিরে যান</a></p>
        </div>

        <div id="msgBox" class="mt-4 p-3 rounded text-center hidden"></div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzE8YwMHm-3HiCWZT2g55nH24C62rGjJu-bCJiXkZi8yQKU99sRUJDEKdTK_-4_PKwXbA/exec";

        function toggleForm() {
            document.getElementById('loginSection').classList.toggle('hidden');
            document.getElementById('registerSection').classList.toggle('hidden');
        }

        function showMsg(text, color) {
            const msgBox = document.getElementById('msgBox');
            msgBox.innerText = text;
            msgBox.className = `mt-4 p-3 rounded text-center bg-${color}-100 text-${color}-700`;
            msgBox.classList.remove('hidden');
        }

        async function handleRegister() {
            const data = {
                action: "register",
                name: document.getElementById('regName').value,
                mobile: document.getElementById('regMobile').value,
                txid: document.getElementById('regTxid').value,
                password: document.getElementById('regPass').value
            };
            showMsg("প্রসেসিং হচ্ছে...", "blue");
            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                showMsg("আবেদন জমা হয়েছে! অ্যাডমিন অ্যাপ্রুভ করলে লগইন করতে পারবেন।", "green");
            } catch(e) { showMsg("জমা হয়েছে, অপেক্ষা করুন।", "green"); }
        }

        function handleLogin() {
            const mobile = document.getElementById('loginMobile').value;
            const pass = document.getElementById('loginPassword').value;
            showMsg("যাচাই করা হচ্ছে...", "blue");

            fetch(SCRIPT_URL + "?action=login&mobile=" + mobile + "&pass=" + pass)
            .then(res => res.json())
            .then(result => {
                if(result.result === "success") {
                    if(result.status === "Pending") {
                        showMsg("আপনার অ্যাকাউন্ট এখনো পেন্ডিং আছে।", "orange");
                    } else {
                        localStorage.setItem("userMobile", mobile);
                        window.location.href = "dashboard.html";
                    }
                } else {
                    showMsg("ভুল মোবাইল বা পাসওয়ার্ড!", "red");
                }
            });
        }
    </script>
</body>
</html>
