<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>অ্যাডমিন প্যানেল - ইউজার ম্যানেজমেন্ট</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .admin-card { background: white; max-width: 900px; margin: auto; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background: #2563eb; color: white; }
        .status-pending { color: orange; font-weight: bold; }
        .status-approved { color: green; font-weight: bold; }
        .btn-approve { background: #10b981; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .btn-refresh { background: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; float: right; }
    </style>
</head>
<body>

<div class="admin-card">
    <h2>ইউজার ম্যানেজমেন্ট প্যানেল <button class="btn-refresh" onclick="loadUsers()">রিফ্রেশ করুন</button></h2>
    <div id="loading">ইউজার লিস্ট লোড হচ্ছে...</div>
    <table>
        <thead>
            <tr>
                <th>নাম</th>
                <th>মোবাইল</th>
                <th>TrxID</th>
                <th>স্ট্যাটাস</th>
                <th>অ্যাকশন</th>
            </tr>
        </thead>
        <tbody id="userTable">
            <!-- ডাটা এখানে আসবে -->
        </tbody>
    </table>
</div>

<script>
    const SCRIPT_URL = "আপনার_SCRIPT_URL_এখানে";

    async function loadUsers() {
        document.getElementById('loading').style.display = "block";
        const response = await fetch(SCRIPT_URL + "?action=getAllUsers");
        const users = await response.json();
        
        const tableBody = document.getElementById('userTable');
        tableBody.innerHTML = "";
        
        users.forEach((user, index) => {
            if(index === 0) return; // হেডার বাদ দিতে
            const row = `<tr>
                <td>${user[1]}</td>
                <td>${user[3]}</td>
                <td>${user[5]}</td>
                <td class="status-${user[7].toLowerCase()}">${user[7]}</td>
                <td>
                    ${user[7] === 'Pending' ? `<button class="btn-approve" onclick="approveUser('${user[3]}')">Approve</button>` : 'অ্যাপ্রুভড'}
                </td>
            </tr>`;
            tableBody.innerHTML += row;
        });
        document.getElementById('loading').style.display = "none";
    }

    async function approveUser(mobile) {
        if(!confirm("আপনি কি এই ইউজারকে অ্যাপ্রুভ করতে চান?")) return;
        await fetch(SCRIPT_URL + "?action=approve&mobile=" + mobile);
        alert("ইউজার অ্যাপ্রুভ হয়েছে!");
        loadUsers();
    }

    window.onload = loadUsers;
</script>
</body>
</html>
